    background-size:cover;
    background-position:center top;
    background-repeat:no-repeat;
    background-attachment:fixed;
    color:var(--teal-900);
    font-family:'Inter', sans-serif;
    -webkit-font-smoothing:antialiased;
    line-height:1.5;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }

  h1{
    font-family:'Onest', sans-serif;
    font-weight:700;
    font-size:clamp(28px, 8vw, 34px);
    line-height:1.15;
    letter-spacing:-0.01em;
  }

  .card{
    width:100%;
    max-width:var(--wrap);
    background:var(--card);
    border-radius:var(--radius-lg);
    box-shadow:var(--shadow-card);
    padding:36px 28px;
  }

  .back-link{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-size:14px;
    font-weight:600;
    color:var(--text-dim);
    text-decoration:none;
    margin-bottom:22px;
  }
  .back-link:hover{ color:var(--teal-500); }
  .back-link svg{ width:14px; height:14px; }

  p.lede{
    margin-top:12px;
    color:var(--text-dim);
    font-size:15.5px;
  }

  form{
    margin-top:26px;
    display:flex;
    flex-direction:column;
    gap:12px;
  }

  input[type="email"]{
    width:100%;
    padding:15px 16px;
    border-radius:14px;
    border:2px solid var(--line);
    background:var(--bg);
    font-family:'Inter', sans-serif;
    font-size:16px;
    color:var(--teal-900);
    outline:none;
    transition:border-color .15s ease;
  }
  input[type="email"]:focus{ border-color:var(--teal-400); }

  button.submit{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    width:100%;
    padding:16px 24px;
    border-radius:100px;
    border:none;
    cursor:pointer;
    font-family:'Onest', sans-serif;
    font-weight:700;
    font-size:16px;
    color:#0D2E2B;
    background:linear-gradient(135deg, var(--teal-300) 0%, var(--teal-400) 100%);
    box-shadow:var(--shadow-bubble);
    transition:transform .15s ease, opacity .15s ease;
  }
  button.submit:active{ transform:scale(0.97); }
  button.submit:disabled{ opacity:0.6; cursor:default; transform:none; }

  .disclaimer{
    margin-top:16px;
    font-size:12.5px;
    color:var(--text-dim);
    text-align:center;
  }

  .form-error{
    display:none;
    font-size:13px;
    color:#B23B2E;
    margin-top:-2px;
  }
  .form-error.visible{ display:block; }

  /* Success state, shown in place of the form after a successful submit */
  .success{
    display:none;
    margin-top:26px;
    text-align:center;
    padding:28px 20px;
    border-radius:var(--radius-md);
    background:var(--bg-soft);
  }
  .success.visible{ display:block; }
  .success .check{
    width:44px; height:44px;
    margin:0 auto 14px;
    border-radius:50%;
    background:var(--teal-400);
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .success .check svg{ width:22px; height:22px; color:#fff; }
  .success h2{
    font-family:'Onest', sans-serif;
    font-weight:700;
    font-size:19px;
    margin-bottom:6px;
  }
  .success p{ font-size:14px; color:var(--text-dim); }
</style>
</head>
<body>

<div class="card">
  <a class="back-link" href="index.html">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4l-6 6 6 6"/></svg>
    Back
  </a>

  <h1>Get updates while we build Impulse</h1>
  <p class="lede">New features, straight to your inbox.</p>

  <!--
    Wired up for Web3Forms (web3forms.com) — free, no monthly cap, no account needed
    beyond an email to generate a key.
    TO ACTIVATE: get a free access key at https://web3forms.com and paste it below,
    replacing WEB3FORMS_ACCESS_KEY_HERE. That's the only step required.
  -->
  <form id="updates-form" action="https://api.web3forms.com/submit" method="POST">
    <input type="hidden" name="access_key" value="WEB3FORMS_ACCESS_KEY_HERE">
    <input type="hidden" name="subject" value="New Impulse updates signup">
    <input type="hidden" name="from_name" value="Impulse landing page">
    <!-- Honeypot field: real visitors never fill this in; bots often do. -->
    <input type="checkbox" name="botcheck" style="display:none" tabindex="-1" autocomplete="off">
    <input type="email" name="email" id="email" placeholder="you@example.com" required autocomplete="email">
    <p class="form-error" id="form-error">That email doesn't look quite right — mind double-checking it?</p>
    <button class="submit" type="submit">Get Updates</button>
  </form>

  <div class="success" id="success-message">
    <div class="check">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
    </div>
    <h2>You're on the list.</h2>
    <p>I'll send updates as new stuff ships. No spam, just progress.</p>
  </div>

  <p class="disclaimer">No spam, ever. Unsubscribe any time.</p>
</div>

<script>
  // Minimal JS: submit the email to Web3Forms via fetch so we can show an inline
  // success state, with a graceful fallback to a normal form POST if fetch fails.
  var form = document.getElementById('updates-form');
  var errorEl = document.getElementById('form-error');
  var successEl = document.getElementById('success-message');
  var emailInput = document.getElementById('email');
  var accessKeyInput = form.querySelector('input[name="access_key"]');

  form.addEventListener('submit', function (e) {
    if (!emailInput.value || !emailInput.checkValidity()) {
      e.preventDefault();
      errorEl.classList.add('visible');
      return;
    }
    errorEl.classList.remove('visible');

    // If the access key hasn't been configured yet, just preview the success state
    // instead of firing a request that's guaranteed to fail.
    if (accessKeyInput.value === 'WEB3FORMS_ACCESS_KEY_HERE') {
      e.preventDefault();
      form.style.display = 'none';
      successEl.classList.add('visible');
      return;
    }

    e.preventDefault();
    var button = form.querySelector('.submit');
    button.disabled = true;
    button.textContent = 'Sending…';

    fetch(form.action, {
      method: 'POST',
      headers: { Accept: 'application/json' },
      body: new FormData(form)
    })
      .then(function (response) { return response.json(); })
      .then(function (data) {
        if (data.success) {
          form.style.display = 'none';
          successEl.classList.add('visible');
        } else {
          throw new Error(data.message || 'Submission failed');
        }
      })
      .catch(function () {
        // Fall back to a normal form submission (full page navigation to the endpoint).
        form.submit();
      });
  });
</script>

</body>
